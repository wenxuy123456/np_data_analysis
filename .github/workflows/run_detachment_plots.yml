name: Run detachment curve analysis

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy scipy matplotlib openpyxl

      - name: Run analysis
        run: python run_all_detachment.py

      - name: Commit generated plots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add np_detachment/outputs/*.png
          git diff --staged --quiet || git commit -m "Update generated detachment plots"
          git push